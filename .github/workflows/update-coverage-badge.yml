name: Update Badges

on:
  push:
    branches: [main]

jobs:
  update-badges:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run tests with coverage
        run: |
          just test-coverage > test-output.txt 2>&1 || true

      - name: Extract test count and coverage
        id: metrics
        run: |
          # Extract test count (e.g., "45 passed")
          TEST_COUNT=$(grep -oP '\d+(?= passed)' test-output.txt || echo "0")
          echo "test_count=$TEST_COUNT" >> $GITHUB_OUTPUT
          echo "Tests: $TEST_COUNT passing"

          # Extract coverage percentage
          COVERAGE=$(python -c "import json; print(json.load(open('coverage.json'))['totals']['percent_covered_display'])")
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Coverage: $COVERAGE%"

      - name: Determine coverage badge color
        id: color
        run: |
          COVERAGE=${{ steps.metrics.outputs.coverage }}
          if (( $(echo "$COVERAGE >= 90" | bc -l) )); then
            COLOR="brightgreen"
          elif (( $(echo "$COVERAGE >= 75" | bc -l) )); then
            COLOR="green"
          elif (( $(echo "$COVERAGE >= 60" | bc -l) )); then
            COLOR="yellow"
          elif (( $(echo "$COVERAGE >= 40" | bc -l) )); then
            COLOR="orange"
          else
            COLOR="red"
          fi
          echo "color=$COLOR" >> $GITHUB_OUTPUT
          echo "Coverage badge color: $COLOR"

      - name: Update gist with badges
        env:
          GIST_ID: 3424657d04826a3196811985d2f13687
          GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          # Create test badge JSON
          cat > tests.json << EOF
          {
            "schemaVersion": 1,
            "label": "tests",
            "message": "${{ steps.metrics.outputs.test_count }} passing",
            "color": "success"
          }
          EOF

          # Create coverage badge JSON
          cat > coverage.json << EOF
          {
            "schemaVersion": 1,
            "label": "coverage",
            "message": "${{ steps.metrics.outputs.coverage }}%",
            "color": "${{ steps.color.outputs.color }}"
          }
          EOF

          # Update both gist files
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/gists/$GIST_ID" \
            -d @- << EOF
          {
            "files": {
              "mapper-tests.json": {
                "content": $(cat tests.json | jq -Rs .)
              },
              "mapper-coverage.json": {
                "content": $(cat coverage.json | jq -Rs .)
              }
            }
          }
          EOF
